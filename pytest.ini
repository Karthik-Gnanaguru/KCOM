[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --html=tests/report.html
    --self-contained-html
    --cov=kcom
    --cov-report=html:tests/coverage_html
    --cov-report=term-missing
    --cov-branch
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
